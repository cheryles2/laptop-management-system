<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh muc san pham</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="shop-header">
        <div>
          <p class="eyebrow">Laptop Market</p>
          <h1 id="category-title">Danh muc</h1>
          <nav class="top-nav">
            <a href="/">Trang chu</a>
            <a href="/orders">Don hang</a>
            <a href="/about">Gioi thieu</a>
          </nav>
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <input
            id="category-search"
            type="text"
            placeholder="Tim san pham trong danh muc..."
          />
          <select id="category-sort">
            <option value="newest">Moi nhat</option>
            <option value="price-asc">Gia thap den cao</option>
            <option value="price-desc">Gia cao den thap</option>
          </select>
        </div>
        <div id="category-grid" class="products-grid"></div>
        <div class="pager">
          <button
            id="category-prev-page"
            class="btn btn-secondary"
            type="button"
          >
            Trang truoc
          </button>
          <span id="category-page-info" class="page-info">Trang 1</span>
          <button
            id="category-next-page"
            class="btn btn-secondary"
            type="button"
          >
            Trang sau
          </button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="category.js" defer></script>
  </body>
</html>
